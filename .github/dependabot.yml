# Dependabot will run on day 8 of each month at 02:34 (Europe/Berlin timezone)
version: 2
updates:

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'cron'
      timezone: 'Europe/Berlin'
      cronjob: '34 2 8 * *'
    open-pull-requests-limit: 15
    assignees:
      - 'iobroker-community-adapters'
    versioning-strategy: 'increase'
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: '@types/node'
        update-types:
          - 'version-update:semver-major'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'cron'
      timezone: 'Europe/Berlin'
      cronjob: '34 2 8 * *'
    open-pull-requests-limit: 15
    assignees:
      - 'iobroker-community-adapters'
